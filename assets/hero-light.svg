<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none" role="img"
     aria-label="W3lt — terminal-first software engineer focused on TypeScript, Rust, AI tooling, and dev infrastructure">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono','Fira Code','SF Mono','Cascadia Code',ui-monospace,'Courier New',monospace; }
      .cursor { animation: blink 1.1s steps(1,end) infinite; }
      @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      .glow { animation: pulse 4.2s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: .10; } 50% { opacity: .22; } }
      .scan { animation: scan 8s ease-in-out infinite alternate; }
      @keyframes scan { from { transform: translateY(0); } to { transform: translateY(244px); } }
    </style>
    <clipPath id="panelClip"><rect x="24" y="24" width="1152" height="312" rx="16"/></clipPath>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0284C7" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#0284C7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- terminal panel -->
  <rect x="24" y="24" width="1152" height="312" rx="16" fill="url(#panelGrad)" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- subtle moving scanline, clipped to the panel -->
  <g clip-path="url(#panelClip)">
    <g class="scan"><rect x="24" y="20" width="1152" height="72" fill="url(#scanGrad)"/></g>
  </g>

  <!-- title bar -->
  <circle cx="58"  cy="58" r="6.5" fill="#FF5F56" opacity="0.9"/>
  <circle cx="82"  cy="58" r="6.5" fill="#FFBD2E" opacity="0.9"/>
  <circle cx="106" cy="58" r="6.5" fill="#27C93F" opacity="0.9"/>
  <text class="mono" x="600" y="63" text-anchor="middle" font-size="17" letter-spacing="0.5">
    <tspan fill="#0284C7">w3lt@negentropy</tspan><tspan fill="#94A3B8"> ~/profile</tspan>
  </text>
  <line x1="24" y1="88" x2="1176" y2="88" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- command line -->
  <text class="mono" x="64" y="150" font-size="26" letter-spacing="0.3">
    <tspan fill="#0284C7" font-weight="600">$ </tspan><tspan fill="#0F172A">build</tspan><tspan fill="#475569"> --focus </tspan><tspan fill="#0EA5E9">"interfaces, systems, ai tooling"</tspan><tspan class="cursor" fill="#0284C7" dx="6">&#9608;</tspan>
  </text>

  <!-- name with soft glow -->
  <text class="mono glow" x="63" y="234" font-size="78" font-weight="700" fill="#0284C7" filter="url(#glow)" letter-spacing="1">Welt</text>
  <text class="mono"      x="63" y="234" font-size="78" font-weight="700" fill="#0F172A" letter-spacing="1">Welt</text>

  <!-- subtitle -->
  <text class="mono" x="65" y="278" font-size="21" fill="#475569" letter-spacing="0.4">Front-end developer · Software engineer · Terminal-first</text>

  <!-- tagline -->
  <text class="mono" x="65" y="314" font-size="19" fill="#0284C7" opacity="0.95" letter-spacing="0.3">reducing entropy in code, products, and knowledge</text>
</svg>
